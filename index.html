<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keychain Designer</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
 <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
  body {
      text-align: center;
      font-family: 'Quicksand', sans-serif;
      background-color: #ffeaff; /* 🎀 nền hồng */
    }

    canvas {
      border: 2px solid #ccc;
      margin-top: 20px;
    }

    img {
      width: 80px;
      cursor: pointer;
      margin: 10px;
    }

   button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 20px; /* bo góc */
  border: none;
  background: #ff8fdc;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff6ec7;
  transform: scale(1.05);
}
     h2 {
  color: #ff6ec7;
  font-weight: 600;
}
    #logo {
  position: absolute;
  top: 10px;
  right: 20px;
  width: 80px;
}
  </style>
</head>

<body>

  <h2>Design your keychain 🎀</h2>
<img src="tini.jpg" id="logo">

  <!-- Sticker -->
  <div>
    <img src="angrykitty.jpg" onclick="addSticker(this)">
<img src="tamagochi.jpg" onclick="addSticker(this)">
    <img src="tamagochi-removebg-preview.png" onclick="addSticker(this)">
    <img src="thỏ-removebg-preview.png" onclick="addSticker(this)">
    
  </div>

  <!-- Canvas -->
  <canvas id="c" width="500" height="500"></canvas>

  <br>

  <button onclick="download()">Download</button>
  <button onclick="deleteObject()">Delete</button>

  <script>
    const canvas = new fabric.Canvas('c');

    // khung móc khóa
  fabric.Image.fromURL('tuizip.png', function(frameImg) {

  // scale theo canvas (auto fit)
 const scale = Math.min(
  (canvas.width * 0.8) / frameImg.width,
  (canvas.height * 0.8) / frameImg.height
);

  frameImg.set({
    scaleX: scale,
    scaleY: scale,
    originX: 'center',
    originY: 'center',
    left: canvas.width / 2,
    top: canvas.height / 2,
    selectable: false,
    evented: false
  });

  canvas.add(frameImg);
  canvas.sendToBack(frameImg);
});

    function addSticker(img) {
      fabric.Image.fromURL(img.src, function(oImg) {
        oImg.set({
          left: 100,
          top: 100,
          scaleX: 0.3,
          scaleY: 0.3
        });
        canvas.add(oImg);
      });
    }

    function download() {
      const dataURL = canvas.toDataURL({
        format: 'png',
        quality: 1
      });

      const link = document.createElement('a');
      link.href = dataURL;
      link.download = 'design.png';
      link.click();
    }

    function deleteObject() {
      const obj = canvas.getActiveObject();
      if (obj) {
        canvas.remove(obj);
      }
    }
  </script>

</body>
</html>
