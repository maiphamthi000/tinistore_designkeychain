<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keychain Designer</title>

  <!-- Import Fabric.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    canvas {
      border: 2px solid #ccc;
      margin-top: 20px;
    }

    img {
      width: 80px;
      cursor: pointer;
      margin: 10px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

  <h2>Design your keychain 🎀</h2>

  <!-- Sticker list -->
  <div>
    <img src="https://i.imgur.com/1.png" onclick="addSticker(this)">
    <img src="https://i.imgur.com/2.png" onclick="addSticker(this)">
    <img src="https://i.imgur.com/3.png" onclick="addSticker(this)">
  </div>

  <!-- Canvas -->
  <canvas id="c" width="500" height="500"></canvas>

  <br>

  <button onclick="download()">Download Design</button>

  <script>
    const canvas = new fabric.Canvas('c');

    // Thêm sticker
    function addSticker(img) {
      fabric.Image.fromURL(img.src, function(oImg) {
        oImg.set({
          left: 100,
          top: 100,
          scaleX: 0.3,
          scaleY: 0.3
        });
        canvas.add(oImg);
      });
    }

    // Download ảnh
    function download() {
      const dataURL = canvas.toDataURL({
        format: 'png',
        quality: 1
      });

      const link = document.createElement('a');
      link.href = dataURL;
      link.download = 'design.png';
      link.click();
    }
// thêm nút xóa
function deleteObject() {
  const obj = canvas.getActiveObject();
  if (obj) {
    canvas.remove(obj);
  }
}
<button onclick="deleteObject()">Delete</button>

// thêm khung móc khóa
const rect = new fabric.Rect({
  left: 50,
  top: 50,
  width: 400,
  height: 400,
  fill: 'transparent',
  stroke: 'pink',
  selectable: false
});

canvas.add(rect);


  </script>

</body>
</html>
